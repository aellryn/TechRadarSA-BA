<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Radar BA&SA</title>
<style>
:root{
  --c0:#3dbf8a;--c0bg:#e8f7f0;--c0bd:#a8dfc8;
  --c1:#f5a623;--c1bg:#fef4e4;--c1bd:#f5d08a;
  --c2:#f07c3a;--c2bg:#fdf0ea;--c2bd:#f0b89a;
  --c3:#e8453c;--c3bg:#fdf0f0;--c3bd:#f0a0a0;
  --bg:#fff;--bg2:#f7f7f5;--text:#1a1a18;--text2:#6b6b67;--text3:#a0a09c;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.06);--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;line-height:1.5;}
#app{max-width:1300px;margin:0 auto;padding:24px 20px;}
#hdr{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border2);}
#hdr h1{font-size:26px;font-weight:600;letter-spacing:-.5px;font-family:Georgia,serif;margin-bottom:3px;}
#hdr .sub{font-size:13px;color:var(--text2);}
#filters{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.flabel{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-right:2px;}
.fbtn{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;}
.fbtn:hover{border-color:var(--text3);color:var(--text);}
.fbtn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.rbtn{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit;}
.rbtn:hover{border-color:var(--text3);color:var(--text);}
.rbtn.active{background:var(--bg2);border-color:var(--text3);color:var(--text);font-weight:500;}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
#layout{display:grid;grid-template-columns:340px 1fr 340px;gap:0 16px;align-items:start;}
.leg{padding-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
.leg-section{margin-bottom:16px;}
.leg-qtitle{font-size:13px;font-weight:600;margin-bottom:8px;}
.leg-rgroup{margin-bottom:9px;}
.leg-rlabel{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.leg-item{font-size:11px;color:var(--text2);line-height:1.8;display:flex;gap:4px;cursor:pointer;transition:color .1s;}
.leg-item:hover{color:var(--text);}
.leg-item .n{min-width:18px;text-align:right;color:var(--text3);flex-shrink:0;}
.leg-item.hl{color:var(--text);font-weight:600;}
#rw{position:relative;}
svg#rs{width:100%;height:auto;display:block;}
#rtt{position:absolute;display:none;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:7px 12px;font-size:12px;color:var(--text);pointer-events:none;white-space:nowrap;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.1);max-width:280px;white-space:normal;line-height:1.5;}
@media(max-width:900px){#layout{grid-template-columns:1fr;}.leg{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <h1>Tech Radar BA&amp;SA</h1>
    <div class="sub">Инструменты и практики бизнес- и системных аналитиков</div>
  </div>

  <div id="filters">
    <div class="frow">
      <span class="flabel">Квадранты:</span>
      <button class="fbtn active" data-q="all">Все</button>
      <button class="fbtn" data-q="methods">Методологии</button>
      <button class="fbtn" data-q="tools">Инструменты</button>
      <button class="fbtn" data-q="ai">AI</button>
      <button class="fbtn" data-q="process">Процессы</button>
    </div>
    <div class="frow">
      <span class="flabel">Кольца:</span>
      <button class="rbtn active" data-r="all"><span class="rdot" style="background:#aaa"></span>Все</button>
      <button class="rbtn" data-r="0"><span class="rdot" style="background:var(--c0)"></span>Это база</button>
      <button class="rbtn" data-r="1"><span class="rdot" style="background:var(--c1)"></span>В части команд</button>
      <button class="rbtn" data-r="2"><span class="rdot" style="background:var(--c2)"></span>Единицы пробуют</button>
      <button class="rbtn" data-r="3"><span class="rdot" style="background:var(--c3)"></span>Присматриваемся</button>
    </div>
  </div>

  <div id="layout">
    <div id="leg-left" class="leg"></div>
    <div id="rw">
      <svg id="rs" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        <circle cx="400" cy="400" r="380" fill="none" stroke="#e8453c" stroke-width="1.2" stroke-opacity="0.3"/>
        <circle cx="400" cy="400" r="285" fill="none" stroke="#f07c3a" stroke-width="1.2" stroke-opacity="0.35"/>
        <circle cx="400" cy="400" r="190" fill="none" stroke="#f5a623" stroke-width="1.2" stroke-opacity="0.4"/>
        <circle cx="400" cy="400" r="95"  fill="none" stroke="#3dbf8a" stroke-width="1.5" stroke-opacity="0.55"/>
        <line x1="400" y1="35" x2="400" y2="765" stroke="#e0e0dc" stroke-width="0.8" stroke-dasharray="4 5"/>
        <line x1="35"  y1="400" x2="765" y2="400" stroke="#e0e0dc" stroke-width="0.8" stroke-dasharray="4 5"/>
        <text x="200" y="55" font-size="11" fill="#c0bdb8" font-family="Helvetica Neue,Arial,sans-serif" text-anchor="middle">Методологии</text>
        <text x="600" y="55" font-size="11" fill="#c0bdb8" font-family="Helvetica Neue,Arial,sans-serif" text-anchor="middle">AI-инструменты</text>
        <text x="200" y="750" font-size="11" fill="#c0bdb8" font-family="Helvetica Neue,Arial,sans-serif" text-anchor="middle">Процессы</text>
        <text x="600" y="750" font-size="11" fill="#c0bdb8" font-family="Helvetica Neue,Arial,sans-serif" text-anchor="middle">Инструменты</text>
        <g id="dl"></g>
      </svg>
      <div id="rtt"></div>
    </div>
    <div id="leg-right" class="leg"></div>
  </div>
</div>

<script>
const RINGS=[
  {name:'Это база',        color:'#3dbf8a',bg:'#e8f7f0',bd:'#a8dfc8',r:95},
  {name:'В части команд',  color:'#f5a623',bg:'#fef4e4',bd:'#f5d08a',r:190},
  {name:'Единицы пробуют', color:'#f07c3a',bg:'#fdf0ea',bd:'#f0b89a',r:285},
  {name:'Присматриваемся', color:'#e8453c',bg:'#fdf0f0',bd:'#f0a0a0',r:380},
];
const QUADS={
  methods:{name:'Методологии',   angle:[Math.PI,Math.PI*1.5],  color:'#7c5cbf',side:'left'},
  process:{name:'Процессы',      angle:[Math.PI*.5,Math.PI],   color:'#2060b0',side:'left'},
  ai:     {name:'AI-инструменты',angle:[0,Math.PI*.5],         color:'#c47820',side:'right'},
  tools:  {name:'Инструменты',   angle:[Math.PI*1.5,Math.PI*2],color:'#1a8a5a',side:'right'},
};

const ITEMS=[
  {name:'BPMN',q:'methods',ring:0,desc:'Business Process Model and Notation — стандарт нотации для описания бизнес-процессов'},
  {name:'CJM',q:'methods',ring:0,desc:'Customer Journey Map — карта пути пользователя через все точки контакта с продуктом'},
  {name:'CustDev',q:'methods',ring:0,desc:'Customer Development — интервью и эксперименты для проверки гипотез'},
  {name:'Double Diamond',q:'methods',ring:0,desc:'Две фазы доставки ценности: Discovery + Delivery'},
  {name:'SMART',q:'methods',ring:0,desc:'Критерии постановки целей: Specific Measurable Achievable Relevant Time-bound'},
  {name:'Story Mapping',q:'methods',ring:0,desc:'Визуализация бэклога через путь пользователя. Помогает расставить приоритеты и выделить MVP'},
  {name:'Use Cases',q:'methods',ring:0,desc:'Сценарии взаимодействия актора с системой'},
  {name:'User Stories',q:'methods',ring:0,desc:'Короткие описания функциональности с точки зрения пользователя'},
  {name:'Глубинное интервью',q:'methods',ring:0,desc:'Качественное исследование: разговор с пользователем для понимания его контекста и мотивов'},
  {name:'C4',q:'methods',ring:1,desc:'Четырёхуровневая модель архитектуры: Context Container Component Code'},
  {name:'MoSCoW',q:'methods',ring:1,desc:'Must/Should/Could/Won\'t — быстрая приоритизация требований со стейкхолдерами'},
  {name:'RICE',q:'methods',ring:1,desc:'Фреймворк приоритизации: Reach Impact Confidence Effort'},
  {name:'Specification by Example',q:'methods',ring:1,desc:'Описание требований через конкретные примеры поведения системы. Основа для BDD'},
  {name:'Event Storming',q:'methods',ring:2,desc:'Воркшоп для совместного исследования доменной логики через события'},
  {name:'Risk Storming',q:'methods',ring:2,desc:'Воркшоп для выявления рисков в архитектуре совместно с командой'},
  {name:'UML',q:'methods',ring:2,desc:'Unified Modeling Language — используем точечно там где нужна строгость нотации'},
  {name:'Domain Storytelling',q:'methods',ring:3,desc:'Совместное исследование домена через истории со стейкхолдерами. Хорошо работает на старте проекта'},
  {name:'Wardley Mapping',q:'methods',ring:3,desc:'Стратегическое картирование эволюции компонентов продукта'},
  {name:'WSJF',q:'methods',ring:3,desc:'Weighted Shortest Job First — приоритизация по соотношению ценности и времени используется в SAFe'},
  {name:'Карта влияния (Impact Mapping)',q:'methods',ring:3,desc:'Связывает бизнес-цели с фичами через акторов и их действия'},
  {name:'Карта результатов (Outcome Mapping)',q:'methods',ring:3,desc:'Фокус на изменении поведения стейкхолдеров а не на выходах'},
  {name:'Confluence',q:'tools',ring:0,desc:'Основная система документирования в компании'},
  {name:'Figma',q:'tools',ring:0,desc:'Инструмент для прототипирования и работы с дизайном интерфейсов'},
  {name:'Holst',q:'tools',ring:0,desc:'Отечественный аналог miro'},
  {name:'Jira',q:'tools',ring:0,desc:'Основной инструмент для управления задачами и бэклогом'},
  {name:'Miro',q:'tools',ring:0,desc:'Онлайн-доска для MindMap, CJM и совместной работы над проектом'},
  {name:'draw.io',q:'tools',ring:0,desc:'Инструмент для создания диаграмм: схемы БД архитектурные диаграммы флоучарты'},
  {name:'Metabase',q:'tools',ring:1,desc:'BI-инструмент для создания дашбордов и отчётов без SQL'},
  {name:'SQL',q:'tools',ring:1,desc:'Язык запросов для анализа данных. Самостоятельные выборки без запросов к разработке'},
  {name:'Swagger/OpenAPI',q:'tools',ring:1,desc:'Стандарт описания REST API. Используем для документирования и согласования контрактов'},
  {name:'Mermaid',q:'tools',ring:2,desc:'Диаграммы как код — описываешь текстом получаешь схему. Работает в Confluence и Git'},
  {name:'Notion',q:'tools',ring:2,desc:'Альтернативная система документирования. Оцениваем как дополнение к Confluence'},
  {name:'Stormbpmn',q:'tools',ring:2,desc:'AI-инструмент для генерации BPMN-диаграмм'},
  {name:'n8n',q:'tools',ring:2,desc:'Автоматизация рабочих процессов с визуальным конструктором'},
  {name:'GPT',q:'ai',ring:0,desc:'ChatGPT / GPT-4o от OpenAI. Используем для генерации текстов анализа требований мозгового штурма'},
  {name:'ИИскатель',q:'ai',ring:0,desc:'Локально развёрнутая LLM-модель компании. Используем для задач с конфиденциальными данными'},
  {name:'AI-агенты типа project_researcher',q:'ai',ring:1,desc:'Claude-агент для исследования проектного контекста. Пробуем в рабочих сценариях'},
  {name:'Claude',q:'ai',ring:1,desc:'Claude от Anthropic. Используем для работы с документами анализа написания требований'},
  {name:'RAG-системы для анализа legacy',q:'ai',ring:1,desc:'Retrieval-Augmented Generation для анализа унаследованных систем и документации'},
  {name:'Cursor',q:'ai',ring:2,desc:'AI-редактор для аналитика пишущего SQL или автоматизирующего рутину скриптами'},
  {name:'Gamma.ai',q:'ai',ring:2,desc:'Инструмент для создания презентаций с помощью AI'},
  {name:'Lovable',q:'ai',ring:2,desc:'AI-инструмент для генерации веб-интерфейсов по описанию. Пробуем для прототипирования'},
  {name:'Claude Design',q:'ai',ring:3,desc:'Claude-агент для работы с дизайном и UX-решениями'},
  {name:'Анализ данных',q:'process',ring:0,desc:'Работа с данными продукта: метрики воронки когорты. Основа продуктовых решений'},
  {name:'Пилотное тестирование',q:'process',ring:0,desc:'Ограниченный запуск фичи на части пользователей перед полным роллаутом'},
  {name:'Тестирование требований',q:'process',ring:0,desc:'Проверка требований на корректность полноту и непротиворечивость до передачи в разработку'},
  {name:'A/B тесты',q:'process',ring:1,desc:'Контролируемые эксперименты для проверки гипотез о влиянии изменений на метрики'},
  {name:'JTBD-интервью',q:'process',ring:1,desc:'Структурированные интервью по методологии Switch / Competing Against Luck'},
  {name:'Discovery-спринты',q:'process',ring:2,desc:'Выделенные итерации для исследования до начала разработки'},
  {name:'Docs-as-code',q:'process',ring:2,desc:'Документация как код — хранится в репозитории версионируется проходит ревью'},
  {name:'Continuous Discovery',q:'process',ring:3,desc:'Еженедельные интервью с пользователями как постоянная практика (Teresa Torres)'},
  {name:'Метрики качества требований',q:'process',ring:3,desc:'Измеряем дефекты из-за требований и переделки — для улучшения качества артефактов'},
  {name:'Ретроспектива требований',q:'process',ring:3,desc:'Разбор дефектов связанных с качеством требований — что пошло не так и почему'},
];

function sortKey(n){return(n.charCodeAt(0)>127?'1':'0')+n.toLowerCase();}
function prepareItems(raw){
  const qo={methods:0,process:1,ai:2,tools:3};
  const s=[...raw].sort((a,b)=>qo[a.q]!==qo[b.q]?qo[a.q]-qo[b.q]:a.ring!==b.ring?a.ring-b.ring:sortKey(a.name).localeCompare(sortKey(b.name)));
  s.forEach((d,i)=>d.num=i+1);
  return s;
}
const items=prepareItems(ITEMS);

const CX=400,CY=400,NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs,parent){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);if(parent)parent.appendChild(e);return e;}
function seedAngle(name,q){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xfffff;const[a1,a2]=QUADS[q].angle,m=0.13;return a1+m+((h%1000)/1000)*(a2-a1-m*2);}
function seedRadius(name,ring){let h=0;for(let i=0;i<name.length;i++)h=(h*17+name.charCodeAt(i))&0xfffff;const inner=ring===0?18:RINGS[ring-1].r+20,outer=RINGS[ring].r-20;return inner+((h%1000)/1000)*(outer-inner);}
function placeDots(its){
  const p=its.map(d=>{const a=seedAngle(d.name,d.q),r=seedRadius(d.name,d.ring);return{...d,x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)};});
  for(let it=0;it<500;it++)for(let i=0;i<p.length;i++)for(let j=i+1;j<p.length;j++){
    const dx=p[j].x-p[i].x,dy=p[j].y-p[i].y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<30&&dist>0){const push=(30-dist)/2,nx=dx/dist,ny=dy/dist;p[i].x-=nx*push;p[i].y-=ny*push;p[j].x+=nx*push;p[j].y+=ny*push;}
  }
  return p;
}

let dots=[],dotEls=[],activeQ='all',activeR='all',selectedDot=null;

function selectDotByItem(d){
  // Deselect previous
  if(selectedDot&&selectedDot!==d){
    const prev=dotEls.find(g=>g._d===selectedDot);
    if(prev){prev._c.setAttribute('fill',RINGS[selectedDot.ring].color);prev._c.setAttribute('r','14');prev._c.setAttribute('opacity','0.88');}
  }
  if(selectedDot===d){
    // Toggle off
    const cur=dotEls.find(g=>g._d===d);
    if(cur){cur._c.setAttribute('fill',RINGS[d.ring].color);cur._c.setAttribute('r','14');cur._c.setAttribute('opacity','0.88');}
    selectedDot=null;
    document.getElementById('rtt').style.display='none';
    hlLeg(null);
    return;
  }
  selectedDot=d;
  const gEl=dotEls.find(g=>g._d===d);
  if(gEl){
    gEl._c.setAttribute('fill','#2563eb');
    gEl._c.setAttribute('r','18');
    gEl._c.setAttribute('opacity','1');
  }
  hlLeg(d.num);
  // Tooltip always bottom-right of dot
  const tt=document.getElementById('rtt');
  tt.innerHTML=`<b style="font-size:13px">${d.num}. ${d.name}</b>${d.desc?`<br><span style="color:var(--text2);font-size:11px">${d.desc}</span>`:''}`;
  tt.style.display='block';
  const svg=document.getElementById('rs');
  const scale=svg.getBoundingClientRect().width/800;
  tt.style.left=(d.x*scale+22)+'px';
  tt.style.top=(d.y*scale+22)+'px';
  // Scroll dot into view smoothly
  const dotScreenY=rect.top+d.y*scale;
  if(dotScreenY<80||dotScreenY>window.innerHeight-80){
    window.scrollTo({top:window.scrollY+dotScreenY-window.innerHeight/2,behavior:'smooth'});
  }
}

function buildRadar(){
  document.getElementById('dl').innerHTML='';dotEls=[];
  dots=placeDots(items);
  const tt=document.getElementById('rtt');
  for(const d of dots){
    const g=svgEl('g',{cursor:'pointer'},document.getElementById('dl'));
    const c=svgEl('circle',{cx:d.x,cy:d.y,r:'14',fill:RINGS[d.ring].color,opacity:'0.88'},g);
    const t=svgEl('text',{x:d.x,y:d.y,'text-anchor':'middle','dominant-baseline':'central','font-size':'9','font-weight':'600',fill:'white','font-family':'Helvetica Neue,Arial,sans-serif'},g);
    t.textContent=d.num;
    g._d=d;g._c=c;dotEls.push(g);
    g.addEventListener('mouseenter',()=>{
      c.setAttribute('r','18');c.setAttribute('opacity','1');
      tt.innerHTML=`<b style="font-size:13px">${d.num}. ${d.name}</b>${d.desc?`<br><span style="color:var(--text2);font-size:11px">${d.desc}</span>`:''}`;
      tt.style.display='block';
      const scale=document.getElementById('rs').getBoundingClientRect().width/800;
      tt.style.left=(d.x*scale+22)+'px';
      tt.style.top=(d.y*scale+22)+'px';
      hlLeg(d.num);
    });
    g.addEventListener('mouseleave',()=>{
      if(selectedDot!==d){c.setAttribute('r','14');c.setAttribute('opacity','0.88');}
      tt.style.display='none';hlLeg(null);
    });
    g.addEventListener('click',()=>{
      // Deselect previous
      if(selectedDot&&selectedDot!==d){
        const prev=dotEls.find(g=>g._d===selectedDot);
        if(prev){prev._c.setAttribute('fill',RINGS[selectedDot.ring].color);prev._c.setAttribute('r','14');prev._c.setAttribute('opacity','0.88');}
      }
      if(selectedDot===d){
        // Toggle off
        c.setAttribute('fill',RINGS[d.ring].color);c.setAttribute('r','14');c.setAttribute('opacity','0.88');
        selectedDot=null;
      } else {
        c.setAttribute('fill','#2563eb');c.setAttribute('r','14');c.setAttribute('opacity','1');
        selectedDot=d;
      }
      hlLeg(selectedDot?selectedDot.num:null);
    });
  }
  applyFilters();
}

function hlLeg(num){document.querySelectorAll('.leg-item').forEach(el=>el.classList.toggle('hl',el.dataset.num==num));}

function applyFilters(){
  selectedDot=null;
  dotEls.forEach(g=>{g._c.setAttribute('fill',RINGS[g._d.ring].color);g._c.setAttribute('r','14');g._c.setAttribute('opacity','0.88');});
  dotEls.forEach(g=>{const d=g._d;const ok=(activeQ==='all'||d.q===activeQ)&&(activeR==='all'||d.ring===parseInt(activeR));g.setAttribute('opacity',ok?'1':'0.05');});
  renderLegend();
}

function renderLegend(){
  const ll=document.getElementById('leg-left'),lr=document.getElementById('leg-right');
  ll.innerHTML='';lr.innerHTML='';
  for(const[qk,qdata]of Object.entries(QUADS)){
    if(activeQ!=='all'&&activeQ!==qk)continue;
    const container=qdata.side==='left'?ll:lr;
    const sec=document.createElement('div');sec.className='leg-section';
    const title=document.createElement('div');title.className='leg-qtitle';title.style.color=qdata.color;title.textContent=qdata.name;
    sec.appendChild(title);
    for(let r=0;r<4;r++){
      if(activeR!=='all'&&activeR!=r)continue;
      const ri=dots.filter(d=>d.q===qk&&d.ring===r);if(!ri.length)continue;
      const rg=document.createElement('div');rg.className='leg-rgroup';
      const rl=document.createElement('div');rl.className='leg-rlabel';rl.style.color=RINGS[r].color;rl.textContent=RINGS[r].name;
      rg.appendChild(rl);
      for(const d of ri){
        const item=document.createElement('div');item.className='leg-item';item.dataset.num=d.num;
        item.innerHTML=`<span class="n">${d.num}.</span><span>${d.name}</span>`;
        item.addEventListener('mouseenter',()=>{const g=dotEls.find(g=>g._d.num===d.num);if(g){g._c.setAttribute('r','18');g._c.setAttribute('opacity','1');}hlLeg(d.num);});
        item.addEventListener('mouseleave',()=>{const g=dotEls.find(g=>g._d.num===d.num);if(g&&selectedDot!==g._d){g._c.setAttribute('r','14');g._c.setAttribute('opacity','0.88');}hlLeg(selectedDot?selectedDot.num:null);});
        item.addEventListener('click',()=>selectDotByItem(d));
        rg.appendChild(item);
      }
      sec.appendChild(rg);
    }
    container.appendChild(sec);
  }
}

document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeQ=b.dataset.q;applyFilters();}));
document.querySelectorAll('.rbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeR=b.dataset.r;applyFilters();}));

buildRadar();
</script>
</body>
