<!DOCTYPE html>
<html lang="ru">
<head>

<style>

    --c0:#3dbf8a; --c0bg:#e8f7f0; --c0bd:#a8dfc8;

    --bg:#ffffff; --bg2:#f7f7f5; --text:#1a1a18; --text2:#6b6b67; --text3:#a0a09c;

  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;line-height:1.5;}
  #app{max-width:1100px;margin:0 auto;padding:24px 20px;}

  #hdr{margin-bottom:24px;border-bottom:1px solid var(--border2);padding-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;}
  #hdr h1{font-size:28px;font-weight:600;letter-spacing:-.5px;margin-bottom:4px;font-family:Georgia,serif;}
  #hdr .sub{font-size:13px;color:var(--text2);}
  #sheets-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;}
  #status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}

  #status-dot.err{background:var(--c3);}

  #config-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  #config-bar label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);}
  #sheets-url-input{flex:1;min-width:200px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;}
  #sheets-url-input:focus{border-color:var(--text3);}
  #load-btn{padding:6px 14px;background:var(--text);color:var(--bg);border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
  #load-btn:hover{opacity:.8;}
  #config-toggle{font-size:11px;color:var(--text3);cursor:pointer;text-decoration:underline;white-space:nowrap;}

  #filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;align-items:center;}
  .flabel{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-right:2px;}
  .sep{width:1px;height:20px;background:var(--border);margin:0 8px;}
  .fbtn{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;}
  .fbtn:hover{border-color:var(--text3);color:var(--text);}
  .fbtn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
  .rbtn{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit;}
  .rbtn:hover{border-color:var(--text3);color:var(--text);}
  .rbtn.active{background:var(--bg2);border-color:var(--text3);color:var(--text);font-weight:500;}
  .rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  #layout{display:grid;grid-template-columns:170px 1fr 170px;gap:0 16px;align-items:start;}
  .leg{padding-top:8px;}
  .leg-section{margin-bottom:28px;}
  .leg-qtitle{font-size:13px;font-weight:600;margin-bottom:10px;}
  .leg-rgroup{margin-bottom:11px;}
  .leg-rlabel{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
  .leg-item{font-size:11px;color:var(--text2);line-height:1.85;display:flex;gap:4px;cursor:pointer;transition:color .1s;}
  .leg-item:hover{color:var(--text);}
  .leg-item .n{min-width:20px;text-align:right;color:var(--text3);flex-shrink:0;}
  .leg-item.hl{color:var(--text);font-weight:600;}

  #rw{position:relative;}
  svg#rs{width:100%;height:auto;display:block;}
  #rtt{position:absolute;display:none;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;font-size:12px;color:var(--text);pointer-events:none;white-space:nowrap;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.1);}

  #loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:8px;z-index:20;}
  #loading-overlay.hidden{display:none;}

let ITEMS = [];
const SHEETS_KEY = 'tl_radar_sheets_url';

// ── XLSX parser ─────────────────────────────────────────────
// Maps Russian column headers to internal keys
const COL_MAP = {
  'name':'name','название':'name',
  'quadrant':'quadrant','квадрант':'quadrant',
  'ring':'ring','кольцо':'ring',
  'description':'description','описание':'description',
};

function cleanKey(k){
  // Remove BOM, trim, lowercase
  return k.replace(/^\uFEFF/, '').replace(/^\xEF\xBB\xBF/, '').trim().toLowerCase();
}

function xlsxToItems(rows) {
  return rows
    .map(r => {
      const norm = {};
      for (const [k,v] of Object.entries(r)) {
        const mapped = COL_MAP[cleanKey(k)];
        if (mapped) norm[mapped] = String(v).trim();
      }
      return norm;
    })
    .filter(r => r.name && r.quadrant && r.ring !== undefined && r.ring !== '')
    .map(r => ({
      name: r.name,
      q: r.quadrant,
      ring: parseInt(r.ring),
      desc: r.description || '',
    }))
    .filter(r => QUADS[r.q] && r.ring >= 0 && r.ring <= 3);
}

// ── Sort & number ───────────────────────────────────────────
function sortKey(name) {
  const c = name[0];
  return (c.charCodeAt(0) > 127 ? '1' : '0') + name.toLowerCase();
}
function prepareItems(raw) {
  const quadOrder = {methods:0, process:1, ai:2, tools:3};
  const sorted = [...raw].sort((a,b) => {
    if (quadOrder[a.q] !== quadOrder[b.q]) return quadOrder[a.q] - quadOrder[b.q];
    if (a.ring !== b.ring) return a.ring - b.ring;
    return sortKey(a.name).localeCompare(sortKey(b.name));
  });
  sorted.forEach((d,i) => d.num = i+1);
  return sorted;
}

// ── Load from Sheets ────────────────────────────────────────
async function loadFromSheets() {
  const url = document.getElementById('sheets-url-input').value.trim();
  if (!url) return;
  setStatus('loading', 'Загрузка…');
  showOverlay(true);
  hideError();
  try {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const arrayBuf = await resp.arrayBuffer();
    const data = new Uint8Array(arrayBuf);
    const workbook = XLSX.read(data, {type:'array', codepage:65001, cellText:true, raw:false});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {defval:'', raw:false});
    const items = xlsxToItems(rows);
    if (!items.length) throw new Error('Не удалось распознать данные. Проверь формат таблицы.');
    ITEMS = prepareItems(items);
    localStorage.setItem(SHEETS_KEY, url);
    setStatus('ok', `Загружено из Google Sheets · ${items.length} элементов`);
    document.getElementById('config-bar').style.display = 'none';
    buildRadar();
  } catch(e) {
    setStatus('err', 'Ошибка загрузки');
    showError(`Не удалось загрузить данные: ${e.message}. <a href="#" onclick="showInstructions();return false;">Проверь инструкцию</a>`);
    if (!ITEMS.length) { ITEMS = prepareItems(FALLBACK_ITEMS); buildRadar(); }
  } finally {
    showOverlay(false);
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = '';
  dot.classList.add(state);
  document.getElementById('status-text').textContent = text;
}
function showOverlay(show) { document.getElementById('loading-overlay').classList.toggle('hidden', !show); }
function hideError() { document.getElementById('error-msg').style.display='none'; }
function showError(html) { const el=document.getElementById('error-msg'); el.innerHTML=html; el.style.display='block'; }
function toggleConfig() {
  const bar = document.getElementById('config-bar');
  bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
  const saved = localStorage.getItem(SHEETS_KEY);
  if (saved) document.getElementById('sheets-url-input').value = saved;
}
function showInstructions() {
  alert(`Как получить CSV-ссылку из Google Sheets:\n\n1. Открой таблицу в Google Sheets\n2. Меню → Файл → Поделиться → Опубликовать в интернете\n3. Выбери нужный лист и формат «Электронная таблица Microsoft Excel (.xlsx)»\n4. Нажми «Опубликовать» и скопируй ссылку\n\nФормат таблицы (первая строка — заголовки):\nname, quadrant, ring, description\n\nquadrant: methods / tools / ai / process\nring: 0 (Это база) / 1 (В части команд) / 2 (Единицы пробуют) / 3 (Присматриваемся)`);
}

// ── Radar rendering ─────────────────────────────────────────
const CX=280, CY=280, NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs,parent){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);if(parent)parent.appendChild(e);return e;}
function seedAngle(name,q){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xfffff;const[a1,a2]=QUADS[q].angle,m=0.13;return a1+m+((h%1000)/1000)*(a2-a1-m*2);}
function seedRadius(name,ring){let h=0;for(let i=0;i<name.length;i++)h=(h*17+name.charCodeAt(i))&0xfffff;const inner=ring===0?12:RINGS[ring-1].r+10,outer=RINGS[ring].r-12;return inner+((h%1000)/1000)*(outer-inner);}
function placeDots(items){
  const p=items.map(d=>{const a=seedAngle(d.name,d.q),r=seedRadius(d.name,d.ring);return{...d,x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)};});
  for(let it=0;it<180;it++)for(let i=0;i<p.length;i++)for(let j=i+1;j<p.length;j++){
    const dx=p[j].x-p[i].x,dy=p[j].y-p[i].y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<16&&dist>0){const push=(16-dist)/2,nx=dx/dist,ny=dy/dist;p[i].x-=nx*push;p[i].y-=ny*push;p[j].x+=nx*push;p[j].y+=ny*push;}
  }
  return p;
}

let dots=[], dotEls=[], activeQ='all', activeR='all';

function buildRadar(){
  document.getElementById('dl').innerHTML=''; dotEls=[];
  dots = placeDots(ITEMS);
  const tt = document.getElementById('rtt');
  for(const d of dots){
    const g=svgEl('g',{cursor:'pointer'},document.getElementById('dl'));
    const c=svgEl('circle',{cx:d.x,cy:d.y,r:'11',fill:RINGS[d.ring].color,opacity:'0.88'},g);
    const t=svgEl('text',{x:d.x,y:d.y,'text-anchor':'middle','dominant-baseline':'central','font-size':'7.5','font-weight':'600',fill:'white','font-family':'Helvetica Neue,Arial,sans-serif'},g);
    t.textContent=d.num;
    g._d=d; g._c=c; dotEls.push(g);
    g.addEventListener('mouseenter',()=>{
      c.setAttribute('r','14'); c.setAttribute('opacity','1');
      tt.innerHTML=`<b>${d.num}. ${d.name}</b>${d.desc?`<br><span style="color:var(--text2);font-size:11px">${d.desc}</span>`:''}`;
      tt.style.display='block';
      const scale=document.getElementById('rs').getBoundingClientRect().width/560;
      tt.style.left=(d.x*scale+14)+'px'; tt.style.top=((d.y-22)*scale)+'px';
      hlLeg(d.num);
    });
    g.addEventListener('mouseleave',()=>{c.setAttribute('r','11');c.setAttribute('opacity','0.88');tt.style.display='none';hlLeg(null);});
  }
  applyFilters();
}

function hlLeg(num){document.querySelectorAll('.leg-item').forEach(el=>el.classList.toggle('hl',el.dataset.num==num));}

function applyFilters(){
  dotEls.forEach(g=>{const d=g._d;const ok=(activeQ==='all'||d.q===activeQ)&&(activeR==='all'||d.ring===parseInt(activeR));g.setAttribute('opacity',ok?'1':'0.05');});
  renderLegend();
}

function renderLegend(){
  const ll=document.getElementById('leg-left'), lr=document.getElementById('leg-right');
  ll.innerHTML=''; lr.innerHTML='';
  for(const[qk,qdata]of Object.entries(QUADS)){
    if(activeQ!=='all'&&activeQ!==qk) continue;
    const container=qdata.side==='left'?ll:lr;
    const sec=document.createElement('div'); sec.className='leg-section';
    const title=document.createElement('div'); title.className='leg-qtitle'; title.style.color=qdata.color; title.textContent=qdata.name;
    sec.appendChild(title);
    for(let r=0;r<4;r++){
      if(activeR!=='all'&&activeR!=r) continue;
      const ri=dots.filter(d=>d.q===qk&&d.ring===r); if(!ri.length) continue;
      const rg=document.createElement('div'); rg.className='leg-rgroup';
      const rl=document.createElement('div'); rl.className='leg-rlabel'; rl.style.color=RINGS[r].color; rl.textContent=RINGS[r].name;
      rg.appendChild(rl);
      for(const d of ri){
        const item=document.createElement('div'); item.className='leg-item'; item.dataset.num=d.num;
        item.innerHTML=`<span class="n">${d.num}.</span><span>${d.name}</span>`;
        item.addEventListener('mouseenter',()=>{const g=dotEls.find(g=>g._d.num===d.num);if(g){g._c.setAttribute('r','14');g._c.setAttribute('opacity','1');}hlLeg(d.num);});
        item.addEventListener('mouseleave',()=>{const g=dotEls.find(g=>g._d.num===d.num);if(g){g._c.setAttribute('r','11');g._c.setAttribute('opacity','0.88');}hlLeg(null);});
        rg.appendChild(item);
      }
      sec.appendChild(rg);
    }
    container.appendChild(sec);
  }
}

document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeQ=b.dataset.q;applyFilters();}));
document.querySelectorAll('.rbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeR=b.dataset.r;applyFilters();}));

// ── Init ────────────────────────────────────────────────────
(async function init(){
  const saved = localStorage.getItem(SHEETS_KEY);
  if (saved) {
    document.getElementById('sheets-url-input').value = saved;
    await loadFromSheets();
  } else {
    // Use fallback data
    ITEMS = prepareItems(FALLBACK_ITEMS);
    setStatus('', 'Встроенные данные · подключи Google Sheets xlsx для совместного редактирования');
    buildRadar();
  }
})();
</script>
